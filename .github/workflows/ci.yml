name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  julia-tests:
    name: Julia Tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - uses: julia-actions/cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libglfw3-dev \
            libopenal-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libfreetype6-dev

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            julia --project=. -e '
              using Pkg
              Pkg.instantiate()
              Pkg.test()
            '
        env:
          OPENREALITY_NO_SHADER_CACHE: "1"

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
            Pkg.test()
          '
        env:
          OPENREALITY_NO_SHADER_CACHE: "1"

  rust-tests:
    name: Rust Tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  swift-tests:
    name: Swift Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        working-directory: metal_bridge
        run: swift test

  bun-tests:
    name: Bun Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: open-reality-website
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: open-reality-website
        run: bun test
